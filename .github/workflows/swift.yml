# Builds and tests the package on macOS and Linux. The manual Float16
# bit conversion in Sources/CBORCodable/Float16.swift is in place
# specifically so the Linux path stays green; this workflow proves it.

name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  macos:
    name: Test on macOS
    runs-on: macos-latest
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -v
      - name: Build and test
        run: swift test -v --parallel

  linux:
    name: Test on Linux (Swift ${{ matrix.swift }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        swift: ["6.0", "6.1"]
    container:
      image: swift:${{ matrix.swift }}
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -v
      - name: Run tests
        run: swift test -v --parallel
